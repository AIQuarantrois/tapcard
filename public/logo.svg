<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 68">
  <defs>
    <linearGradient id="gi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#DB2777"/>
    </linearGradient>
    <linearGradient id="gt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#DB2777"/>
    </linearGradient>
  </defs>

  <!-- Icon mark -->
  <rect x="2" y="2" width="64" height="64" rx="15" fill="url(#gi)"/>
  <!-- Card inside icon -->
  <rect x="14" y="20" width="38" height="24" rx="4" fill="rgba(255,255,255,.92)"/>
  <rect x="18" y="25" width="14" height="3" rx="1.5" fill="rgba(109,40,217,.5)"/>
  <rect x="18" y="30" width="20" height="2.5" rx="1.25" fill="rgba(109,40,217,.2)"/>
  <rect x="18" y="34" width="16" height="2.5" rx="1.25" fill="rgba(109,40,217,.14)"/>
  <circle cx="42" cy="25" r="4.5" fill="url(#gi)"/>

  <!-- Wordmark: "tap" in dark, "card" in gradient -->
  <text x="80" y="46"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36" font-weight="600"
    fill="#F5F5F7" letter-spacing="-1">tap</text>
  <text x="144" y="46"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36" font-weight="600"
    fill="url(#gt)" letter-spacing="-1">card</text>

  <!-- Tagline -->
  <text x="81" y="60"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="9" font-weight="300" letter-spacing="3.5"
    fill="rgba(245,245,247,.35)" text-anchor="start">ONE TAP. REAL CONNECTION.</text>
</svg>
